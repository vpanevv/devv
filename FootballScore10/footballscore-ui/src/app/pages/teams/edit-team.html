<div class="container formPage">
    <div class="pageHead">
        <div>
            <div class="cardEyebrow">Club management</div>
            <h1 class="h1">Edit team</h1>
            <p class="sub">Rename a registered club.</p>
        </div>
        <a class="btn btn-ghost" routerLink="/standings">← Back to dashboard</a>
    </div>

    <div *ngIf="isLoading" class="loadingState">
        <span class="spinner"></span> Loading team…
    </div>
    <div *ngIf="error" class="alert error" style="margin-bottom: 12px;">{{ error }}</div>

    <div *ngIf="!isLoading" class="card card-pad formCard">
        <form [formGroup]="form" (ngSubmit)="submit()">
            <div class="field">
                <label class="label">Team name</label>
                <input class="input" formControlName="name" placeholder="e.g. Arsenal" />
                <div class="hint" *ngIf="form.controls['name'].touched && form.controls['name'].invalid">
                    <span *ngIf="form.controls['name'].errors?.['required']">Name is required.</span>
                    <span *ngIf="form.controls['name'].errors?.['minlength']">Min 3 chars.</span>
                    <span *ngIf="form.controls['name'].errors?.['maxlength']">Max 50 chars.</span>
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-ghost" type="button" (click)="cancel()">Cancel</button>
                <button class="btn btn-primary" type="submit" [disabled]="isSaving">
                    {{ isSaving ? 'Saving…' : 'Save changes' }}
                </button>
            </div>
        </form>
    </div>
</div>
